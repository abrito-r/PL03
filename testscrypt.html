<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body >
    <h1>🎯 Apanha o Quadrado</h1>
  <p>Pontos: <span id="score">0</span></p>

  <div id="gameArea" style="
    width: 300px;
    height: 300px;
    border: 2px solid black;
    margin: auto;
    position: relative;
  ">
    <div id="square" onclick="moveSquare()" style="
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      top: 100px;
      left: 100px;
      cursor: pointer;
    "></div>
  </div>

  <script>
    let score = 0;

    function moveSquare() {
      score++;
      document.getElementById("score").innerText = score;

      let square = document.getElementById("square");

      let maxX = 250; // 300 - 50
      let maxY = 250;

      let randomX = Math.random() * maxX;
      let randomY = Math.random() * maxY;

      square.style.left = randomX + "px";
      square.style.top = randomY + "px";
    }
  </script>
</body>
</html>
